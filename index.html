<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teto Rhythm Game</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* Score e Combo */
#score, #combo {
    position: absolute;
    top: 10px;
    font-size: 24px;
    z-index: 10;
}
#score { left: 10px; }
#combo { right: 10px; }

/* Canvas note */
#gameCanvas {
    position: absolute;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* Sfondo immagine blurrata e scura */
#bg {
    position: fixed;
    top:0;
    left:0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: url('immagine_2026-03-03_204259655.png') center center/cover no-repeat;
    filter: brightness(0.4) blur(4px);
}

button {
    position: absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index: 10;
    font-size: 18px;
    padding: 10px 20px;
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="score">Punti: 0</div>
<div id="combo">Combo: 0x</div>
<canvas id="gameCanvas"></canvas>

<audio id="bgm" src="BIRDBRAIN.mp3"></audio>
<button id="startBtn">Start!</button>

<script>
// --- Variabili ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const bgm = document.getElementById("bgm");
const startBtn = document.getElementById("startBtn");

let notes = [];
let score = 0;
let combo = 0;
let maxCombo = 0;
let gameRunning = false;

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Funzioni gioco ---
function startGame(){
    if(gameRunning) return;
    gameRunning = true;
    startBtn.style.display = "none";
    bgm.play();
    spawnNotes();
    requestAnimationFrame(gameLoop);
}

// Genera note
function spawnNotes(){
    if(!gameRunning) return;
    const x = Math.random()*(canvas.width-30);
    notes.push({x:x, y:0, width:30, height:30});
    setTimeout(spawnNotes, 800); // ogni 0.8s
}

// Disegna note
function drawNotes(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'red';
    notes.forEach(note=>{
        ctx.fillRect(note.x,note.y,note.width,note.height);
        note.y += 4;
    });
}

// --- Controllo barra spaziatrice: singolo colpo per pressione ---
let keyPressed = false;
document.addEventListener("keydown", function(e){
    if(e.code==="Space" && !keyPressed){
        keyPressed = true;
        let hit = false;
        notes.forEach((note,index)=>{
            if(note.y + note.height >= canvas.height - 70 && note.y <= canvas.height - 40){
                notes.splice(index,1);
                hit = true;
            }
        });
        if(hit){
            combo +=1;
            if(combo>maxCombo) maxCombo=combo;
            score += 100 * combo; // moltiplicatore
        } else {
            combo = 0; // reset combo se fallisci
        }
        document.getElementById("score").innerText = "Punti: " + score;
        document.getElementById("combo").innerText = "Combo: " + combo + "x";
    }
});
document.addEventListener("keyup", function(e){
    if(e.code==="Space") keyPressed = false;
});

// --- Loop principale ---
function gameLoop(){
    if(!gameRunning) return;
    drawNotes();
    requestAnimationFrame(gameLoop);
}

// --- Start button ---
startBtn.addEventListener("click", startGame);
</script>

</body>
</html>
