<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teto Fun</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #f0f8ff; /* cielo azzurro */
    height: 100vh;
}

/* Immagine Kasane Teto */
#teto {
    position: absolute;
    bottom: 20px;
    width: 150px;
    transition: transform 0.2s;
}

/* Animazione destra/sinistra */
</style>
</head>

<body>

<img id="teto" src="teto.png" alt="Kasane Teto">

<script>
// Posizione iniziale
let teto = document.getElementById("teto");
let posX = 0;
let speed = 2;
let direction = 1; // 1 = destra, -1 = sinistra

function animateTeto() {
    posX += speed * direction;
    teto.style.left = posX + "px";

    // Cambia direzione se raggiunge il bordo
    if (posX + teto.width >= window.innerWidth) direction = -1;
    if (posX <= 0) direction = 1;

    // Ruota Teto per guardare la direzione
    if (direction === 1) teto.style.transform = "scaleX(1)";
    else teto.style.transform = "scaleX(-1)";

    requestAnimationFrame(animateTeto);
}

animateTeto();
</script>

</body>
</html>
