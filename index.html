<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game BPM</title>

<style>
body {margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}

#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;}

#bgYoutube {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 177.77vh;
  height: 100vh;
  min-width: 100vw;
  min-height: 56.25vw;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 1s, filter 0.2s ease;
}

#bgImg {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition:opacity 1s;
}

#videoOverlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1;
  pointer-events:none;
  transition: background 0.2s ease;
}

#introScreen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.8);
  z-index:10;
  transition:opacity 0.5s;
}

button, select {
  padding:10px 20px;
  margin:5px;
  font-size:18px;
  background:rgba(255,255,255,0.1);
  border:2px solid white;
  color:white;
  cursor:pointer;
}

#showStart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:300px;
  display:none;
  z-index:20;
}
</style>
</head>

<body>

<iframe id="bgYoutube" frameborder="0" allow="autoplay; encrypted-media"></iframe>
<img id="bgImg">
<div id="videoOverlay"></div>

<canvas id="gameCanvas"></canvas>

<div id="introScreen">
  <h1 id="songTitle">BIRDBRAIN</h1>
  <select id="songSelector">
    <option value="BIRDBRAIN">BIRDBRAIN</option>
    <option value="Mesmerizer">Mesmerizer</option>
  </select>
  <button id="startBtn">START</button>
</div>

<img id="showStart" src="SHOW_START.png">

<audio id="bgm"></audio>
<audio id="startSfx" src="startSound.mp3"></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const bgm=document.getElementById("bgm");
const startSfx=document.getElementById("startSfx");
const bgYoutube=document.getElementById("bgYoutube");
const bgImg=document.getElementById("bgImg");
const overlay=document.getElementById("videoOverlay");

const columns=4;
const columnWidth=canvas.width/columns;
let columnKeys=["D","F","J","K"];
let columnCodes=["KeyD","KeyF","KeyJ","KeyK"];

let notes=[];
let hitRatings=[];
let gameRunning=false;
let noteSpeed=400;
let BPM=140;
let beatInterval=60/BPM;
let lastBeat=0;
let lastTime=0;

const songs={
"BIRDBRAIN":{
  mp3:"BIRDBRAIN.mp3",
  BPM:140,
  speed:400,
  bgType:"youtube",
  bg:"0iVlSNpq8i8"
},
"Mesmerizer":{
  mp3:"mesmerizer.mp3",
  BPM:120,
  speed:500,
  bgType:"image",
  bg:"bg_mesmerizer.png"
}
};

let currentSong=songs["BIRDBRAIN"];

document.getElementById("songSelector").addEventListener("change",e=>{
  currentSong=songs[e.target.value];
  document.getElementById("songTitle").innerText=e.target.value;
});

document.getElementById("startBtn").addEventListener("click",()=>{
  document.getElementById("introScreen").style.opacity=0;

  setTimeout(()=>{
    document.getElementById("introScreen").style.display="none";

    startSfx.play();
    document.getElementById("showStart").style.display="block";

    if(currentSong.bgType==="youtube"){
      bgImg.style.opacity=0;
      bgYoutube.src=
      "https://www.youtube.com/embed/"+currentSong.bg+
      "?autoplay=1&mute=1&controls=0&loop=1&playlist="+
      currentSong.bg+
      "&modestbranding=1&rel=0";
      bgYoutube.style.opacity=1;
    }else{
      bgYoutube.style.opacity=0;
      bgYoutube.src="";
      bgImg.src=currentSong.bg;
      bgImg.style.opacity=1;
    }

    setTimeout(()=>{
      document.getElementById("showStart").style.display="none";
      startGame();
    },1000);

  },500);
});

function startGame(){
  notes=[];
  BPM=currentSong.BPM;
  noteSpeed=currentSong.speed;
  beatInterval=60/BPM;
  lastBeat=0;
  lastTime=0;

  bgm.src=currentSong.mp3;
  bgm.play();
  gameRunning=true;
  requestAnimationFrame(gameLoop);
}

function generateNotes(time){
  while(time-lastBeat>=beatInterval){
    const col=Math.floor(Math.random()*columns);
    notes.push({x:col*columnWidth+20,y:-50,column:col,hit:false});
    lastBeat+=beatInterval;
  }
}

document.addEventListener("keydown",e=>{
  if(!gameRunning)return;
  for(let note of notes){
    if(note.hit)continue;
    if(e.code===columnCodes[note.column] &&
       note.y>canvas.height-120 &&
       note.y<canvas.height-40){

      note.hit=true;

      let rating="NICE";
      const dist=Math.abs(note.y-(canvas.height-70));
      if(dist<5) rating="PERFECT";
      else if(dist<10) rating="SICK";
      else if(dist<20) rating="AWESOME";
      else if(dist<35) rating="NICE";

      const img=new Image();
      img.src=rating+".png";
      hitRatings.push({img:img,x:note.x,y:note.y,alpha:1});
    }
  }
});

function gameLoop(timestamp){
  if(!gameRunning)return;

  const delta=(timestamp-lastTime)/1000;
  lastTime=timestamp;

  generateNotes(bgm.currentTime);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Pulse overlay
  const beatProgress=(bgm.currentTime%beatInterval)/beatInterval;
  const pulse=0.45+0.1*Math.sin(beatProgress*Math.PI);
  overlay.style.background="rgba(0,0,0,"+pulse+")";

  for(let note of notes){
    if(note.hit)continue;
    note.y+=noteSpeed*delta;
    ctx.fillStyle="red";
    ctx.fillRect(note.x,note.y,columnWidth-40,50);

    if(note.y>canvas.height-70){
      note.hit=true;
      const img=new Image();
      img.src="MISS.png";
      hitRatings.push({img:img,x:note.x,y:canvas.height-70,alpha:1});
    }
  }

  for(let r of hitRatings){
    ctx.globalAlpha=r.alpha;
    ctx.drawImage(r.img,r.x,r.y,100,50);
    ctx.globalAlpha=1;
    r.y-=1;
    r.alpha-=0.02;
  }

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
